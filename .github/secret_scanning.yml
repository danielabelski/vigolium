# Secret scanning / push-protection exclusions.
#
# The secret-detection engine (pkg/secretscan) and the secret_detect passive
# module ship a synthetic detection corpus — sample credentials shaped like the
# real thing on purpose, so the rules can be tested. These are NOT live secrets.
# Exclude their test fixtures so scanning/push-protection doesn't flag them.
paths-ignore:
  - "pkg/secretscan/testdata/**"
  - "pkg/secretscan/**/*_test.go"
  - "pkg/modules/passive/secret_detect/testdata/**"
  - "pkg/modules/passive/secret_detect/**/*_test.go"
